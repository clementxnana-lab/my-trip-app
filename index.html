<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的旅行日誌</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #F8F9FD; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        .trip-header { background: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%); }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-lg overflow-hidden relative">
        
        
<header class="trip-header text-white px-6 pt-12 pb-5 sticky top-0 z-50">
            <h1 class="text-2xl font-bold">04/03 星期五</h1>
            <div class="flex items-center space-x-2 mt-3">
                <i class="fa-solid fa-plane text-orange-200"></i>
                <span class="text-sm font-medium">大眾運輸 ▾</span>
            </div>
            <button class="absolute top-12 right-6 p-2 rounded-full text-lg"><i class="fa-solid fa-gear"></i></button>
        </header>

        
<main class="px-5 py-6 space-y-8 flex-1 overflow-y-auto pb-24">
            <div v-for="(item, index) in itinerary" :key="index" class="relative">
                
<div v-if="index < itinerary.length - 1" class="absolute left-[1.125rem] top-12 bottom-0 w-0.5 border-l-2 border-dashed border-gray-100"></div>
                
                
<div class="flex items-start space-x-3 mb-8 cursor-pointer active:scale-98 transition-all" @click="openNote(item)">
                    
<div class="w-9 h-9 flex-shrink-0 rounded-full flex items-center justify-center font-bold text-lg" :class="item.type === '住宿' ? 'bg-rose-500 text-white' : 'bg-gray-100 text-gray-800'">
                        {{ item.number }}
                    </div>
                    
                    
<div class="flex-1 bg-white p-4 rounded-xl border border-gray-100 shadow-sm relative">
                        
<img v-if="item.image" :src="item.image" class="w-16 h-16 rounded-lg absolute -right-3 -top-3 shadow-md object-cover border-4 border-white" />
                        
                        <div class="flex items-center space-x-2 mb-1.5 text-xs text-gray-500 font-medium">
                            <span class="text-xs">{{ item.time }}</span>
                        </div>
                        <h3 class="font-black text-gray-900 text-lg leading-tight mb-1">{{ item.location }}</h3>
                        
                        <div class="text-[10px] text-gray-400 leading-tight">
                            <p><i class="fa-solid fa-clock text-rose-300 mr-1"></i>營業時間: {{ item.hours || '暫無資訊' }}</p>
                        </div>
                        
                        
<div v-if="item.note" class="mt-3 text-xs bg-gray-50 p-2.5 rounded-lg text-gray-600 leading-relaxed italic">
                            <i class="fa-solid fa-pencil text-gray-300 mr-1.5"></i>"{{ item.note }}"
                        </div>
                    </div>
                </div>

                
<div v-if="index < itinerary.length - 1" class="flex items-center space-x-2 my-2 text-xs text-blue-500 font-semibold pl-12">
                    <i class="fa-solid fa-clock text-blue-300"></i>
                    <span>{{ item.transitTime }} ({{ item.transitMode }})</span>
                </div>
            </div>
        </main>

        
<transition name="fade">
            <div v-if="currentNoteItem" class="fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-6 backdrop-blur-sm" @click.self="currentNoteItem = null">
                <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
                    <button class="absolute -top-3 -right-3 w-8 h-8 bg-white rounded-full flex items-center justify-center text-rose-500 shadow-lg" @click="currentNoteItem = null"><i class="fa-solid fa-times"></i></button>
                    <h4 class="text-xl font-bold text-gray-800 mb-1">{{ currentNoteItem.location }}</h4>
                    <p class="text-xs text-blue-500 font-bold tracking-widest uppercase mb-6">{{ currentNoteItem.time }}</p>
                    
                    <label class="text-sm font-bold text-gray-900 block mb-2">我的個人注記</label>
                    <textarea v-model="currentNoteItem.note" class="w-full h-32 p-4 border rounded-xl bg-slate-50 text-sm focus:ring-2 focus:ring-rose-200" placeholder="點擊此處增加你的個人注記..."></textarea>
                    
                    <button @click="currentNoteItem = null" class="w-full mt-6 py-3 bg-rose-500 text-white rounded-xl font-bold text-sm">確認並儲存</button>
                </div>
            </div>
        </transition>

        
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-sm border-t flex justify-around py-3 px-4 shadow-xl safe-bottom z-40">
            <button @click="goNav()" class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-location-dot text-xl"></i><span class="text-[10px] mt-1 font-bold">導航</span></button>
            <button class="flex flex-col items-center text-rose-600"><i class="fa-solid fa-heart text-xl"></i><span class="text-[10px] mt-1 font-bold">收藏</span></button>
            <button class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-route text-xl"></i><span class="text-[10px] mt-1 font-bold">行程</span></button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const currentDay = ref(1);
                const currentNoteItem = ref(null);

                // 行程資料陣列
                const itinerary = ref([
                    { number: 1, day: 1, time: "08:00", location: "嘉義智選假日酒店", addr: "嘉義市西區中山路", type: "住宿", hours: "24小時營業", note: "大廳環境不錯，飯店人員很親切。", image: "https://lh5.googleusercontent.com/p/AF1QipN3-v-vVqC-80K55-8I-02I-4_W_I-6-G_Y_I-6=w400-h300-k-no" },
                    { number: 2, day: 1, time: "09:34", location: "品皇咖啡觀光工廠", addr: "嘉義縣太保市", tag: "景點", hours: "08:00–17:00", memo: "停留01小時00分", note: "試喝咖啡免費。", image: "https://lh5.googleusercontent.com/p/AF1QipM-p-D-E-o-fV-C-8-G-Y-I-6-G_Y_I-6=w400-h300-k-no", transitTime: "00時34分", transitMode: "大眾運輸" },
                    { number: 3, day: 1, time: "11:00", location: "白人牙膏觀光工廠", addr: "嘉義縣水上鄉", tag: "景點", hours: "08:00–17:00", memo: "停留01小時00分 · 有筆記", note: "一定要跟將軍府拍照。", image: "https://lh5.googleusercontent.com/p/AF1QipN-D-o-o-fV-C-8-G-Y-I-6-G_Y_I-6=w400-h300-k-no", transitTime: "00時26分", transitMode: "大眾運輸" }
                ]);

                // 開啟注記視窗
                const openNote = (item) => {
                    currentNoteItem.value = item;
                }

                // 一鍵導航
                const goNav = (addr) => {
                    const url = addr ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}` : `https://www.google.com/maps/search/?api=1&query=阿里山`;
                    window.open(url, '_blank');
                };

                return { currentDay, itinerary, currentNoteItem, openNote, goNav };
            }
        }).mount('#app');
    </script>
</body>
</html>
